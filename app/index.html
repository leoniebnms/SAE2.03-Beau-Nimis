<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
    

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};
      

      C.handlerHome = async function () {
        const categories = await DataMovie.readCategories();
        const movies = await DataMovie.requestMovies();
        
        await V.renderMovieCategory(categories, movies);
      };
      
      C.handlerDetail = async function (id) {
        const movie = await DataMovie.requestMovieDetails(id);
        const detailHTML = await MovieDetail.format(movie);
        document.getElementById('content').innerHTML = detailHTML;
      };

      // C.handlerAbout = function () {
      //   alert(
      //     "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
      //   );
      // };

      // C'était pour l'itération 1
      //  C.handlerCategory = async function () {
      //   const movies = await DataMovie.requestMovies();
      //   const contentHTML = await Movie.format(movies);
      //   document.getElementById('content').innerHTML = contentHTML;
      // };

      C.handlerCategory = async function () {
        const categories = await DataMovie.readCategories();
        const movies = await DataMovie.requestMovies();

        await V.renderMovieCategory(categories, movies);
      };

      C.handlerMovie = async function () {
        const movies = await DataMovie.requestMovies();
        await V.renderMovie(movies);
      };

      C.handlerCategoryById = async function (id) {
        const allMovies = await DataMovie.requestMovies();
        const filtered = allMovies.filter(m => m.id_category == id);
        
        document.querySelector('.navbar__dropdown').open = false;
        await V.renderMovie(filtered);
      };

      C.start = async function () {
        await V.renderNavBar("C.handlerAbout()", "C.handlerHome()", "C.handlerCategory()");
        C.handlerCategory();
       
      };
     
      
      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = async function (hAbout, hHome, hCategory) {
        const categories = await DataMovie.readCategories();

        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome, hCategory, categories);
      };

      V.renderMovie =  async function (movies) {
        let content = document.querySelector("#content");
        content.innerHTML = await Movie.format(movies);
      }; 
      
      V.renderMovieCategory = async function (categories, movies) {
        let content = document.querySelector("#content");
        content.innerHTML = await MovieCategory.format(categories, movies);
      };

     
      
      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
