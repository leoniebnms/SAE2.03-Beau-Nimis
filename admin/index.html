<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>

     <section id="app">

        <nav> 
            <h1>BACK OFFICE</h1>
        </nav>
        
        <section id="log"></section>
            
        <section id="addMovie"></section>

        <section id="addProfile"></section>
    
    </section>


    <script type="module">
      import { Log } from "./component/Log/script.js";

      import { MovieForm } from "./component/MovieForm/script.js";
      import { DataMovie } from "./data/dataMovie.js";

      import { ProfileForm } from "./component/ProfileForm/script.js";
      import { DataProfile } from "../app/data/dataProfile.js";

      window.C = {};
      
      C.handlerAddMovie = async function () {
        let form = document.querySelector(".addMovie__form");

        if (!form.reportValidity()){
          V.renderLog("Veuillez remplir tous les champs s'il vous plaît.");
          return;
        }

        let fd = new FormData(form);
        let res = await DataMovie.add(fd);
        
        if(res && res.message) {
          V.renderLog(res.message);
        } else {
          V.renderLog("Erreur: Impossible d'ajouter le film.");
        }
      };

      C.handlerAddProfile = async function () {
        let form = document.querySelector(".addProfile__form");

        if (!form.reportValidity()){
          V.renderLog("Veuillez remplir tous les champs s'il vous plaît.");
          return;
        }

        let fd = new FormData(form);
        let res = await DataProfile.add(fd);

        if(res && res.message) {
          V.renderLog(res.message);
        } else {
          V.renderLog("Erreur: Impossible d'ajouter le profil.");
        }
      };

      C.handlerEditProfile = async function (profileId) {
        const profiles = await DataProfile.read();
        const p = profiles.find(p => p.id == profileId);

        if (p) {
          document.querySelector(".addProfile__form input[name='id']").value = p.id;
          document.querySelector(".addProfile__form input[name='name']").value = p.name;
          document.querySelector(".addProfile__form input[name='image']").value = p.image;
          document.querySelector(".addProfile__form input[name='age']").value = p.age;
          
          document.querySelector(".addProfile__title").innerText = "Modifier le profil";
          document.querySelector(".addProfile__form input[type='button']").onclick = C.handlerSaveProfile;
        }
      };

      C.handlerSaveProfile = async function () {
        let form = document.querySelector(".addProfile__form");

        let fd = new FormData(form);
        let res = await DataProfile.update(fd);

        if(res && res.message) {
          V.renderLog(res.message);
        } else {
          V.renderLog("Erreur: Impossible de modifier le profil.");
        }
      };

      C.handlerHome = async function () {
         const categories = await DataMovie.readCategories();
         const movies = await DataMovie.requestMovies(window.C.currentAge);
         await V.renderMovieCategory(categories, movies);
      };


      C.start = async function () {
        V.renderLog("Démarrage de l'application");

        await V.renderProfile( "C.handlerAddProfile()");

        try {
          let categories = await DataMovie.getCategories();
          V.renderMovie( "C.handlerAddMovie()", categories );
          V.renderLog("Catégories chargées avec succès.");


        } catch (error) {
          V.renderLog("Erreur lors du chargement des catégories.");
        }
      };

      
      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderMovie = function (handler, categories) {
        let content = document.querySelector("#addMovie");
        content.innerHTML = MovieForm.format(handler, categories);
      };

      V.renderProfile = async function (handler) {
        let content = document.querySelector("#addProfile");
        try {
          let profiles = await DataProfile.read();       
          content.innerHTML = ProfileForm.format(handler) + ProfileForm.formatList(profiles);
        } catch (e) {
          console.error("Erreur lors de la lecture des profils : ", e);
          content.innerHTML = ProfileForm.format(handler);
        }
        
      };

      C.start();
    </script>
  </body>
</html>
